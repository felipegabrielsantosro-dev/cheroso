{% extends "layouts/main.html" %}
{% block title %}Usuários{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-2">
            <i class="fa-solid fa-user-shield fa-lg text-primary"></i>
            <h4 class="mb-0 fw-semibold">Usuários do Sistema</h4>
        </div>
        <button class="btn btn-primary px-4"
            onclick="api.window.open('pages/user', { width: 800, height: 600, title: 'Cadastrar Usuário' })">
            <i class="fa-solid fa-plus me-2"></i>Novo Usuário
        </button>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-3">
            <table id="table-users" class="table table-striped table-hover table-bordered align-middle mb-0" style="width: 100%;">
                <thead class="table-dark">
                    <tr>
                        <th class="text-center" style="width: 60px;">#</th>
                        <th><i class="fa-solid fa-user me-1"></i>Nome</th>
                        <th><i class="fa-solid fa-id-card me-1"></i>CPF</th>
                        <th><i class="fa-solid fa-fingerprint me-1"></i>RG</th>
                        <th class="text-center" style="width: 100px;">Status</th>
                        <th class="text-center" style="width: 180px;">Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="file:///{{ assets }}/js/listauser.js"></script>
{% endblock %}
