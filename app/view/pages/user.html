{% extends "layouts/main.html" %}
{% block title %}{{ action == 'edit' and 'Editar Usuário' or 'Novo Usuário' }}{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex align-items-center gap-2 mb-4">
        <i class="fa-solid fa-user-gear fa-lg text-primary"></i>
        <h4 class="mb-0 fw-semibold">{{ action == 'edit' and 'Editar Usuário' or 'Novo Usuário' }}</h4>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form id="form">
                <input type="hidden" id="id" name="id">
                <input type="hidden" id="action" name="action">
                <div class="row g-3 mb-3">
                    <div class="col-12">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="nome" name="nome" placeholder="Nome" autofocus>
                            <label for="nome"><i class="fa-solid fa-user me-1"></i>Nome do Usuário</label>
                        </div>
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="cpf" name="cpf" placeholder="CPF">
                            <label for="cpf"><i class="fa-solid fa-id-card me-1"></i>CPF</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="rg" name="rg" placeholder="RG">
                            <label for="rg"><i class="fa-solid fa-id-card me-1"></i>RG</label>
                        </div>
                    </div>
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="ativo" id="ativo" value="true" checked>
                            <label class="form-check-label fw-medium" for="ativo">Usuário Ativo</label>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-primary px-4" id="insert">
                        <i class="fa-solid fa-floppy-disk me-2"></i>Salvar
                    </button>
                    <button type="button" class="btn btn-outline-secondary px-4" onclick="api.window.close()">
                        <i class="fa-solid fa-xmark me-2"></i>Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="file:///{{ assets }}/js/user.js"></script>
{% endblock %}
